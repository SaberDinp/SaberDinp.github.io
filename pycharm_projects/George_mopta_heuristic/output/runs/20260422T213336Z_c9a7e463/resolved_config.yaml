data:
  path: AIMMS_MOPTA_2026/AIMMS-MOPTA Interfor data.xlsx
  sheets:
    locations: Locations
    shipments: Shipments
    carriers: Carriers
    lanes: Lanes
    difficult_lanes: Difficult Lanes
constraints:
