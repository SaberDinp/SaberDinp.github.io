education:
  enabled: true
  workers: 0
  every_n_generations: 2
  p_edu: 0.12
  max_ls_iters: 2
  home_penalty_per_mile: 4.0
  max_home_dist: 100.0
  or_opt_1: true
  two_opt: true
  or_opt_2: true
output:
  directory: output
  solution_json: solution.json
  summary_csv: solution_summary.csv
  infeasible_debug_json: last_infeasible_debug.json
  log_level: INFO
  run_archive: true
  runs_subdirectory: runs
