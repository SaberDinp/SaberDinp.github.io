# =============================================================
# Default solver configuration — override via CLI or custom YAML
# =============================================================

data:
  path: "AIMMS_MOPTA_2026/AIMMS-MOPTA Interfor data.xlsx"
  sheets:
    locations: "Locations"
    shipments: "Shipments"
    carriers: "Carriers"
    lanes: "Lanes"
    difficult_lanes: "Difficult Lanes"

constraints:
  max_miles_per_day: 450.0
  max_deadhead_fraction: 0.50        # 50% of weekly miles
  min_weekly_earnings: 4000.0        # $ per driver per week
  max_final_dist_from_home: 100.0    # miles, uses lane mileage
  min_consecutive_days_off: 2
  max_working_days: 5                # implies 7-day week

ga:
  population_size: 200
  max_generations: 5000
  elite_size: 4
  # Optional: if set to a fraction in (0, 1], overrides elite_size, e.g. 0.004 → 4 elites at pop 1000
  # elite_fraction: null
  crossover_rate: 0.80
  mutation_rate_gene: 0.04           # probability to flip each gene
  tournament_size: 4
  stagnation_limit: 1000               # stop if best unchanged for N gens
  max_wall_seconds: 3600             # hard wall clock cap (1 hr)
  seed: 42
  eval_workers: 1                    # fitness workers; 1 = sequential, 0 = auto-cap at 12

  # Subset scaler for quick runs / debugging
  # Set to null to use all orders
  order_subset: null                 # e.g., 50 to run on first 50 orders

penalties:
  # Soft penalty weights (added to objective during evolution only;
  # final solution is explicitly checked for hard feasibility)
  deadhead_fraction: 2000.0          # per fractional unit over 50%
  final_dist_from_home: 5.0          # per mile over 100
  min_weekly_earnings_shortfall: 3.0  # per $1 below min weekly earnings (active truck)
  total_miles_over_5days: 3.0        # per mile over 2250 (5 * 450)

education:
  enabled: true
  workers: 1                    # education workers; 1 = sequential, 0 = auto-cap at 12
  # Throttle LS: full-data runs were ~2x slower than GA-only; keys drifted after mutate/repair.
  every_n_generations: 2        # run education pass every N generations (1 = every gen)
  p_edu: 0.12                   # fraction of non-elites educated when a pass runs (was 0.30)
  max_ls_iters: 2               # passes of (or_opt_1, two_opt, or_opt_2) per truck (was 3)
  home_penalty_per_mile: 4.0    # LS surrogate for return-home; lower → closer alignment with freight cost
  max_home_dist: 100.0
  or_opt_1: true
  two_opt: true
  or_opt_2: true

output:
  directory: "output"
  solution_json: "solution.json"
  summary_csv: "solution_summary.csv"
  infeasible_debug_json: "last_infeasible_debug.json"  # written only if strict check fails
  log_level: "INFO"
  # Per-run audit trail: argv, resolved YAML, terminal.log, solution copies under directory/runs/<run_id>/
  run_archive: true
  runs_subdirectory: "runs"
